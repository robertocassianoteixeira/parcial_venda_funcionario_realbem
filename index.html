<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parcial de Vendas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--sf:#14171d;--sf2:#1c2028;--sf3:#22262f;
  --bd:#2a2e38;--bd2:#3a3f4d;
  --tx:#e8eaf0;--mu:#7a8099;--mu2:#464c60;
  --ac:#f0a030;--ac2:#f5c86a;--acd:rgba(240,160,48,.08);
  --ok:#3ecf7a;--er:#f05858;--in:#5090f0;
}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;min-height:100vh}

.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;gap:12px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--ac)}
.logo span{color:var(--tx)}
#hd-period{font-size:11px;color:var(--mu);text-align:right;line-height:1.6}
#hd-period strong{color:var(--ac2)}

.wrap{max-width:960px;margin:0 auto;padding:44px 20px}
.wrap-sm{max-width:480px;margin:0 auto;padding:44px 20px}

#s-loading{display:block;text-align:center;padding:80px 20px}
#s-error{display:none;text-align:center;padding:80px 20px}
#s-filial{display:none}
#s-auth{display:none}
#s-report{display:none}

.spin{display:inline-block;width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:var(--mu);font-size:13px}

.err-pg-ico{font-size:40px;margin-bottom:16px}
.err-pg-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--er);margin-bottom:8px}
.err-pg-msg{font-size:12px;color:var(--mu);line-height:1.8;max-width:400px;margin:0 auto}

.l-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1.15;margin-bottom:10px}
.l-title em{color:var(--ac);font-style:normal}
.l-sub{font-size:13px;color:var(--mu);line-height:1.85;margin-bottom:32px;max-width:480px}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:24px}

.field{margin-bottom:14px;position:relative}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.field input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--ac2);letter-spacing:1.5px;outline:none;transition:border-color .2s;text-transform:uppercase}
.field input[type=password]{letter-spacing:3px;font-size:18px;text-transform:none}
.field input:focus{border-color:var(--ac)}
.field input::placeholder{color:var(--bd2);font-size:12px;text-transform:none;font-weight:400;letter-spacing:.3px}

.ac{position:absolute;top:calc(100% - 1px);left:0;right:0;background:var(--sf2);border:1px solid var(--bd2);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:60;display:none}
.ac.show{display:block}
.ac-item{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--tx);transition:background .12s}
.ac-item:hover,.ac-item.hi{background:var(--acd);color:var(--ac2)}
.ac-none{padding:10px 14px;font-size:12px;color:var(--mu)}

.err-inline{background:rgba(240,88,88,.1);border:1px solid rgba(240,88,88,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--er);margin-bottom:14px;display:none}

.info-box{background:rgba(80,144,240,.08);border:1px solid rgba(80,144,240,.25);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--in);margin-bottom:14px;line-height:1.7}
.warn-box{background:rgba(240,192,48,.08);border:1px solid rgba(240,192,48,.25);border-radius:8px;padding:12px 16px;font-size:12px;color:#f0c030;margin-bottom:14px;line-height:1.7}

.btn{width:100%;padding:13px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.3px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-p{background:var(--ac);color:#0b0d10}
.btn-p:hover:not(:disabled){background:var(--ac2)}
.btn-g{background:var(--sf2);color:var(--mu);border:1px solid var(--bd)}
.btn-g:hover{color:var(--tx);border-color:var(--bd2)}
.btn-sm{width:auto;padding:8px 16px;font-size:12px}
.btn-row{display:flex;gap:10px}

.auth-store{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--ac2);letter-spacing:.5px;margin-bottom:4px}
.auth-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px}
.auth-sub{font-size:12px;color:var(--mu);line-height:1.75;margin-bottom:20px}
.auth-sub strong{color:var(--tx)}

.rp-bar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:32px}
.rp-store{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.rp-store em{color:var(--ac);font-style:normal}
.rp-meta{font-size:11px;color:var(--mu);margin-top:4px;line-height:1.7}
.rp-meta strong{color:var(--ac2)}

.dv{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dv::after{content:'';flex:1;height:1px;background:var(--bd)}

.kpi-sec{margin-bottom:30px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 16px}
.kpi-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.kpi-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1}
.kpi-val.ac{color:var(--ac)}
.kpi-val.ok{color:var(--ok)}
.kpi-val.in{color:var(--in)}
.kpi-sub{font-size:11px;color:var(--mu);margin-top:5px}

.tbl-wrap{overflow-x:auto;margin-bottom:36px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid var(--bd2)}
th{padding:10px 12px;text-align:left;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);font-weight:600;white-space:nowrap}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid var(--bd);transition:background .12s}
tbody tr:hover{background:var(--sf2)}
td{padding:10px 12px;vertical-align:middle}
td.money{font-variant-numeric:tabular-nums;font-weight:600;color:var(--ac2)}
td.dim{color:var(--mu)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--sf3);color:var(--mu)}
tfoot tr{border-top:1px solid var(--bd2);background:var(--sf)}
tfoot td{padding:11px 12px;font-weight:600}

.grp-head{text-align:center!important;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 12px;border-bottom:none}
.grp-rank{width:36px}
.grp-acum-head{color:var(--ac);border-bottom:2px solid var(--ac)!important}
.grp-ontem-head{color:var(--ok);border-bottom:2px solid var(--ok)!important}
.grp-acum{border-top:2px solid var(--ac)}
.grp-ontem{border-top:2px solid var(--ok)}
.grp-acum-td{border-left:none}
.grp-ontem-td{border-left:none}
tbody tr td.grp-ontem-td:first-of-type,tfoot tr td.grp-ontem-td:first-of-type,thead tr th.grp-ontem:first-of-type{border-left:1px solid var(--bd2)}

.footer{text-align:center;padding:28px 0 14px;font-size:11px;color:var(--mu2)}

@media(max-width:600px){.l-title{font-size:26px}.wrap-sm{padding:28px 14px}}
@media print{
  body{background:#fff;color:#111}
  .hd,.no-print{display:none!important}
  #s-report{display:block!important}
  .kpi{border:1px solid #ccc;background:#fafafa}
  .kpi-val{color:#111!important}
  td,th{color:#111!important;padding:7px 10px}
  tfoot tr{background:#f0f0f0}
}
</style>
</head>
<body>

<header class="hd">
  <div class="logo">parcial<span>.</span></div>
  <div id="hd-period"></div>
</header>

<!-- CARREGANDO -->
<div id="s-loading">
  <div style="padding:80px 20px;text-align:center">
    <div class="spin"></div>
    <div class="loading-txt">Carregando dados…</div>
  </div>
</div>

<!-- ERRO -->
<div id="s-error">
  <div style="padding:80px 20px;text-align:center">
    <div class="err-pg-ico">⚠️</div>
    <div class="err-pg-title">Dados não disponíveis</div>
    <div class="err-pg-msg" id="err-pg-msg">A planilha ainda não foi publicada pelo administrador.</div>
  </div>
</div>

<!-- SELECIONAR FILIAL -->
<div id="s-filial">
  <div class="wrap-sm">
    <h1 class="l-title">Parcial de<br><em>Vendas</em></h1>
    <p class="l-sub">Digite o nome da sua filial para acessar o relatório.</p>
    <div class="card">
      <div class="err-inline" id="err-filial"></div>
      <div class="field">
        <label for="inp-filial">Filial</label>
        <input type="text" id="inp-filial" placeholder="Ex: Arroio Grande 2" autocomplete="off"/>
        <div class="ac" id="ac-list"></div>
      </div>
      <button class="btn btn-p" id="btn-continuar" disabled>Continuar →</button>
    </div>
  </div>
</div>

<!-- AUTENTICAÇÃO -->
<div id="s-auth">
  <div class="wrap-sm">
    <div class="card" id="auth-box"></div>
  </div>
</div>

<!-- RELATÓRIO -->
<div id="s-report">
  <div class="wrap">
    <div class="rp-bar no-print">
      <div>
        <div class="rp-store" id="rp-store"></div>
        <div class="rp-meta" id="rp-meta"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-g btn-sm" onclick="backToSearch()">← Voltar</button>
        <button class="btn btn-p btn-sm" onclick="window.print()">🖨 Imprimir</button>
      </div>
    </div>
    <div class="kpi-sec">
      <div class="dv">Acumulado no período</div>
      <div class="kpi-grid" id="kpis-acum"></div>
    </div>
    <div class="kpi-sec" id="sec-ontem">
      <div class="dv">Ontem</div>
      <div class="kpi-grid" id="kpis-ontem"></div>
    </div>
    <div class="kpi-sec">
      <div class="dv">Vendedores</div>
      <div class="tbl-wrap">
        <table>
          <thead id="rank-head"></thead>
          <tbody id="rank-body"></tbody>
          <tfoot id="rank-foot"></tfoot>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="footer-txt">dados processados localmente no navegador</div>

<script>
// ── SUPABASE REST API ──────────────────────────────────
const SUPA_URL = 'https://uqkyvvfqbmleplqjiqas.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxa3l2dmZxYm1sZXBscWppcWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODA2NjUsImV4cCI6MjA5NDY1NjY2NX0.0bWqQXu0ms-WMzfd15jqjo4OGTLfZt5PPultAVFXHiM';

const supaHeaders = {
  'apikey': SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`,
  'Content-Type': 'application/json'
};

async function supaGet(table, params='') {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, { headers: supaHeaders });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function supaPost(table, body) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method:'POST', headers:{...supaHeaders,'Prefer':'return=minimal'}, body:JSON.stringify(body)
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||`HTTP ${res.status}`); }
}

async function supaPatch(table, filter, body) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${filter}`, {
    method:'PATCH', headers:{...supaHeaders,'Prefer':'return=minimal'}, body:JSON.stringify(body)
  });
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||`HTTP ${res.status}`); }
}

async function logAccess(filial, acao) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/access_log`, {
      method:'POST',
      headers:{...supaHeaders,'Prefer':'return=minimal'},
      body: JSON.stringify({ filial, acao })
    });
  } catch(_) { /* silencioso */ }
}

// ── STATE ──────────────────────────────────────────────
let allRows=[], filiais=[], periodText='', updatedAt='';
let currentFilial='', authMode='', authenticatedFilial='';
let acIdx=-1;

// ── UTILS ──────────────────────────────────────────────
const brl = v => v==null||isNaN(v)||v==='' ? '—'
  : 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const n = v => (v==null||v===''||isNaN(Number(v)))?0:Number(v);

async function hashSenha(senha, filial) {
  const txt = senha+'::'+filial.toLowerCase()+'::realbem2025';
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(txt));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function show(id) {
  ['s-loading','s-error','s-filial','s-auth','s-report'].forEach(s=>{
    document.getElementById(s).style.display = s===id?'block':'none';
  });
}

// ── CARREGAR DADOS ─────────────────────────────────────
async function loadData() {
  show('s-loading');
  const host = location.hostname;
  const path = location.pathname;
  const userMatch = host.match(/^(.+)\.github\.io$/);
  let url = './dados.json';
  if (userMatch) {
    const user = userMatch[1];
    const repo = path.split('/').filter(Boolean)[0]||'';
    if (repo) url = `https://raw.githubusercontent.com/${user}/${repo}/main/dados.json`;
  }
  try {
    const res = await fetch(url+'?t='+Date.now());
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    periodText = data.period||'';
    updatedAt  = data.updatedAt||'';
    allRows    = data.rows||[];
    filiais    = [...new Set(allRows.map(r=>r.filial))].sort();
    // DEBUG — remover depois
    if(allRows.length) console.log('Primeira linha:', JSON.stringify(allRows[0]));
    if (periodText) {
      const el = document.getElementById('hd-period');
      el.innerHTML = 'Dados: <strong>'+periodText+'</strong>';
    }
    if (updatedAt) {
      document.getElementById('footer-txt').textContent =
        'Última atualização: '+new Date(updatedAt).toLocaleString('pt-BR');
    }
    show('s-filial');
  } catch(ex) {
    document.getElementById('err-pg-msg').innerHTML =
      'Não foi possível carregar os dados.<br>'
      +'<span style="color:var(--mu2);font-size:11px">'+ex.message+'</span>';
    show('s-error');
  }
}

// ── AUTOCOMPLETE ───────────────────────────────────────
const inpF   = document.getElementById('inp-filial');
const acList = document.getElementById('ac-list');
const btnC   = document.getElementById('btn-continuar');

inpF.addEventListener('input', ()=>{
  acIdx=-1;
  const q=inpF.value.trim().toUpperCase();
  document.getElementById('err-filial').style.display='none';
  if(!q){acList.classList.remove('show');btnC.disabled=true;return;}
  const m=filiais.filter(f=>f.toUpperCase().includes(q));
  acList.innerHTML=m.length
    ? m.slice(0,30).map(f=>`<div class="ac-item" data-val="${f.replace(/"/g,'&quot;')}">${f}</div>`).join('')
    : '<div class="ac-none">Nenhuma filial encontrada</div>';
  acList.classList.add('show');
  acList.querySelectorAll('.ac-item').forEach(el=>
    el.addEventListener('mousedown',()=>{inpF.value=el.dataset.val;acList.classList.remove('show');btnC.disabled=false;})
  );
  btnC.disabled=!q;
});
inpF.addEventListener('keydown',e=>{
  const items=[...acList.querySelectorAll('.ac-item')];
  if(!items.length)return;
  if(e.key==='ArrowDown'){acIdx=Math.min(acIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hi',i===acIdx));e.preventDefault();}
  else if(e.key==='ArrowUp'){acIdx=Math.max(acIdx-1,0);items.forEach((el,i)=>el.classList.toggle('hi',i===acIdx));e.preventDefault();}
  else if(e.key==='Enter'&&acIdx>=0){inpF.value=items[acIdx].dataset.val;acList.classList.remove('show');btnC.disabled=false;e.preventDefault();}
  else if(e.key==='Escape')acList.classList.remove('show');
});
inpF.addEventListener('blur',()=>setTimeout(()=>acList.classList.remove('show'),150));
inpF.addEventListener('keydown',e=>{if(e.key==='Enter'&&!btnC.disabled)continuar();});
btnC.addEventListener('click',continuar);

// ── CONTINUAR (após escolher filial) ───────────────────
async function continuar() {
  const q = inpF.value.trim().toUpperCase();
  const row = allRows.find(r=>r.filial.toUpperCase()===q)
           || allRows.find(r=>r.filial.toUpperCase().includes(q));
  if(!row){showErrFilial('Filial não encontrada.');return;}
  currentFilial = row.filial;

  // Já autenticado nesta filial → vai direto para o relatório
  if(currentFilial===authenticatedFilial){gerarRelatorio();return;}

  btnC.disabled=true;
  btnC.textContent='Verificando…';
  try {
    const rows = await supaGet('filial_auth',
      `filial=eq.${encodeURIComponent(currentFilial)}&select=senha_hash,reset_pendente`);
    const data = rows[0] || null;
    if(!data)                  authMode='criar';
    else if(data.reset_pendente) authMode='reset';
    else                       authMode='login';
    renderAuth();
    show('s-auth');
  } catch(e) {
    showErrFilial('Erro de conexão. Tente novamente.');
  } finally {
    btnC.disabled=false;
    btnC.textContent='Continuar →';
  }
}

// ── RENDERIZAR TELA DE AUTH ────────────────────────────
function renderAuth() {
  const configs = {
    criar: {
      title: 'Primeiro acesso',
      sub:   `Crie uma senha para acessar os dados de <strong>${currentFilial}</strong>.`,
      info:  null,
      warn:  null,
      campos: 2,
      btnTxt: 'Criar senha e acessar',
      fn: 'criarSenha()'
    },
    reset: {
      title: 'Redefinição de senha',
      sub:   `Defina uma nova senha para <strong>${currentFilial}</strong>.`,
      info:  null,
      warn:  '🔓 O administrador liberou a redefinição da sua senha.',
      campos: 2,
      btnTxt: 'Definir nova senha',
      fn: 'redefinirSenha()'
    },
    login: {
      title: 'Acesso seguro',
      sub:   `Digite a senha de <strong>${currentFilial}</strong> para continuar.`,
      info:  null,
      warn:  null,
      campos: 1,
      btnTxt: 'Acessar →',
      fn: 'fazerLogin()'
    }
  };
  const c = configs[authMode];
  let html = `
    <div style="margin-bottom:18px">
      <div class="auth-store"># ${currentFilial}</div>
      <div class="auth-title">${c.title}</div>
      <div class="auth-sub">${c.sub}</div>
    </div>
    ${c.warn ? `<div class="warn-box">${c.warn}</div>` : ''}
    <div class="err-inline" id="err-auth"></div>
    <div class="field">
      <label>${c.campos===2?'Criar senha':'Senha'}</label>
      <input type="password" id="inp-senha" placeholder="Mínimo 6 caracteres" autocomplete="${c.campos===2?'new':'current'}-password"/>
    </div>
    ${c.campos===2 ? `<div class="field"><label>Confirmar senha</label><input type="password" id="inp-senha2" placeholder="Repita a senha" autocomplete="new-password"/></div>` : ''}
    <button class="btn btn-p" id="btn-auth" onclick="${c.fn}">${c.btnTxt}</button>
    <button class="btn btn-g" style="margin-top:10px" onclick="backToFilial()">← Voltar</button>
    ${authMode==='login' ? `<div style="text-align:center;margin-top:16px"><a href="#" onclick="solicitarReset(event)" style="font-size:12px;color:var(--mu);text-decoration:none;border-bottom:1px dashed var(--mu2)">Esqueci minha senha</a></div>` : ''}
  `;
  document.getElementById('auth-box').innerHTML = html;
  setTimeout(()=>document.getElementById('inp-senha')?.focus(),100);

  // Enter key on password
  document.getElementById('inp-senha')?.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      if(c.campos===2) document.getElementById('inp-senha2')?.focus();
      else eval(c.fn);
    }
  });
  document.getElementById('inp-senha2')?.addEventListener('keydown',e=>{
    if(e.key==='Enter') eval(c.fn);
  });
}

// ── SOLICITAR RESET ────────────────────────────────────
async function solicitarReset(e) {
  e.preventDefault();
  if(!confirm(`Solicitar redefinição de senha para "${currentFilial}"?\n\nO administrador receberá a solicitação e precisará aprová-la.`)) return;
  const link = e.target;
  link.textContent = 'Enviando…';
  try {
    await supaPatch('filial_auth', `filial=eq.${encodeURIComponent(currentFilial)}`,
      {solicitou_reset:true, solicitou_reset_em:new Date().toISOString()});
    await logAccess(currentFilial, 'pediu_reset');
    document.getElementById('auth-box').innerHTML = `
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:36px;margin-bottom:14px">📩</div>
        <div class="auth-title" style="margin-bottom:8px">Solicitação enviada!</div>
        <div style="font-size:13px;color:var(--mu);line-height:1.8;margin-bottom:20px">
          Sua solicitação foi registrada.<br>Aguarde o administrador liberar o reset.
        </div>
        <button class="btn btn-g" onclick="backToFilial()">← Voltar</button>
      </div>
    `;
  } catch(err) {
    link.textContent = 'Esqueci minha senha';
    showErrAuth('Erro ao enviar solicitação. Tente novamente.');
  }
}


async function fazerLogin() {
  const senha = document.getElementById('inp-senha').value;
  if(!senha){showErrAuth('Digite a senha.');return;}
  setAuthBtn('Verificando…');
  try {
    const hash = await hashSenha(senha, currentFilial);
    const rows = await supaGet('filial_auth',
      `filial=eq.${encodeURIComponent(currentFilial)}&select=senha_hash`);
    if(rows[0]?.senha_hash===hash){
      authenticatedFilial=currentFilial;
      await logAccess(currentFilial, 'login');
      gerarRelatorio();
    } else {
      showErrAuth('Senha incorreta. Tente novamente.');
      document.getElementById('inp-senha').value='';
      document.getElementById('inp-senha').focus();
    }
  } catch(e){ showErrAuth('Erro de conexão. Tente novamente.'); }
  finally{ setAuthBtn('Acessar →'); }
}

// ── CRIAR SENHA ────────────────────────────────────────
async function criarSenha() {
  const senha=document.getElementById('inp-senha').value;
  const senha2=document.getElementById('inp-senha2').value;
  if(!validarSenhas(senha,senha2))return;
  setAuthBtn('Salvando…');
  try {
    const hash = await hashSenha(senha, currentFilial);
    await supaPost('filial_auth', {filial:currentFilial, senha_hash:hash, reset_pendente:false});
    authenticatedFilial=currentFilial;
    await logAccess(currentFilial, 'cadastro_senha');
    gerarRelatorio();
  } catch(e){ showErrAuth('Erro ao salvar. Tente novamente.'); setAuthBtn('Criar senha e acessar'); }
}

// ── REDEFINIR SENHA ────────────────────────────────────
async function redefinirSenha() {
  const senha=document.getElementById('inp-senha').value;
  const senha2=document.getElementById('inp-senha2').value;
  if(!validarSenhas(senha,senha2))return;
  setAuthBtn('Salvando…');
  try {
    const hash = await hashSenha(senha, currentFilial);
    await supaPatch('filial_auth', `filial=eq.${encodeURIComponent(currentFilial)}`,
      {senha_hash:hash, reset_pendente:false, atualizado_em:new Date().toISOString()});
    authenticatedFilial=currentFilial;
    await logAccess(currentFilial, 'redefiniu_senha');
    gerarRelatorio();
  } catch(e){ showErrAuth('Erro ao redefinir. Tente novamente.'); setAuthBtn('Definir nova senha'); }
}

function validarSenhas(s,s2) {
  if(s.length<6){showErrAuth('A senha deve ter pelo menos 6 caracteres.');return false;}
  if(s!==s2){showErrAuth('As senhas não conferem.');return false;}
  return true;
}
function setAuthBtn(txt) {
  const b=document.getElementById('btn-auth');
  if(b){b.disabled=txt!=='Acessar →'&&txt!=='Criar senha e acessar'&&txt!=='Definir nova senha';b.textContent=txt;}
}
function showErrAuth(msg){const e=document.getElementById('err-auth');if(e){e.textContent=msg;e.style.display='block';}}
function showErrFilial(msg){const e=document.getElementById('err-filial');e.textContent=msg;e.style.display='block';}
function backToFilial(){show('s-filial');}

// ── GERAR RELATÓRIO ────────────────────────────────────
function gerarRelatorio() {
  logAccess(currentFilial, 'consulta_relatorio');
  let rows = allRows.filter(r=>r.filial===currentFilial);
  rows = [...rows].sort((a,b)=>b.va-a.va);
  const totVA=rows.reduce((s,r)=>s+r.va,0), totQA=rows.reduce((s,r)=>s+r.qa,0);
  const totVO=rows.reduce((s,r)=>s+r.vo,0), totQO=rows.reduce((s,r)=>s+r.qo,0);
  const tickA=totQA>0?totVA/totQA:0, tickO=totQO>0?totVO/totQO:0;
  const vendOntem=rows.filter(r=>r.qo>0).length;
  const hasOntem=rows.some(r=>r.vo>0||r.qo>0||r.to>0);

  document.getElementById('rp-store').innerHTML='<em>#</em> '+currentFilial;
  document.getElementById('rp-meta').innerHTML=
    (periodText?'Período: <strong>'+periodText+'</strong> &nbsp;·&nbsp; ':'')+
    rows.length+' vendedor'+(rows.length>1?'es':'');

  // KPIs acumulado
  document.getElementById('kpis-acum').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">Venda total</div><div class="kpi-val" style="color:var(--ac)">${brl(totVA)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Ticket médio</div><div class="kpi-val">${brl(tickA)}</div><div class="kpi-sub">por venda</div></div>
    <div class="kpi"><div class="kpi-lbl">Qtd de vendas</div><div class="kpi-val in">${totQA.toLocaleString('pt-BR')}</div><div class="kpi-sub">transações</div></div>
  `;

  // KPIs ontem
  const secO=document.getElementById('sec-ontem');
  if(hasOntem){
    secO.style.display='';
    document.getElementById('kpis-ontem').innerHTML=`
      <div class="kpi"><div class="kpi-lbl">Venda ontem</div><div class="kpi-val ok">${brl(totVO)}</div><div class="kpi-sub">${vendOntem} vendedor${vendOntem>1?'es':''} com venda</div></div>
      <div class="kpi"><div class="kpi-lbl">Ticket médio ontem</div><div class="kpi-val">${brl(tickO)}</div><div class="kpi-sub">por venda</div></div>
      <div class="kpi"><div class="kpi-lbl">Qtd ontem</div><div class="kpi-val in">${totQO.toLocaleString('pt-BR')}</div><div class="kpi-sub">transações</div></div>
    `;
  } else { secO.style.display='none'; }

  // ── TABELA COMBINADA (estilo planilha) ──────────────
  const medals=['🥇','🥈','🥉'];

  const colsOntem = hasOntem ? `
    <th class="r grp-ontem">Venda</th>
    <th class="r grp-ontem">Ticket Médio</th>
    <th class="r grp-ontem">Qtd</th>` : '';
  const grpOntemHead = hasOntem
    ? `<th colspan="3" class="grp-head grp-ontem-head">ONTEM</th>` : '';

  const theadHTML = `
    <tr>
      <th colspan="2" class="grp-head" style="background:transparent;border-bottom:none"></th>
      <th colspan="3" class="grp-head grp-acum-head">ACUMULADO</th>
      ${grpOntemHead}
    </tr>
    <tr>
      <th class="grp-rank">#</th>
      <th>Vendedor</th>
      <th class="r grp-acum">Venda</th>
      <th class="r grp-acum">Ticket Médio</th>
      <th class="r grp-acum">Qtd</th>
      ${colsOntem}
    </tr>`;

  const bodyHTML = rows.map((r,i)=>{
    // cada coluna de ontem é avaliada independentemente
    const voTxt = r.vo>0  ? `<span class="money">${brl(r.vo)}</span>` : '<span class="badge">—</span>';
    const toTxt = r.to>0  ? `<span class="dim">${brl(r.to)}</span>`   : '<span class="dim">—</span>';
    const qoTxt = r.qo>0  ? `<span class="dim">${r.qo.toLocaleString('pt-BR')}</span>` : '<span class="dim">—</span>';

    const ontemCols = hasOntem ? `
      <td class="r grp-ontem-td">${voTxt}</td>
      <td class="r grp-ontem-td">${toTxt}</td>
      <td class="r grp-ontem-td">${qoTxt}</td>` : '';

    return `<tr>
      <td>${medals[i]||(i+1)+'º'}</td>
      <td>${r.vendedor}</td>
      <td class="r money grp-acum-td">${brl(r.va)}</td>
      <td class="r dim grp-acum-td">${brl(r.ta)}</td>
      <td class="r dim grp-acum-td">${r.qa.toLocaleString('pt-BR')}</td>
      ${ontemCols}
    </tr>`;
  }).join('');

  const footOntemCols = hasOntem
    ? `<td class="r grp-ontem-td">${totVO>0?brl(totVO):'—'}</td><td class="r grp-ontem-td">${tickO>0?brl(tickO):'—'}</td><td class="r grp-ontem-td">${totQO>0?totQO.toLocaleString('pt-BR'):'—'}</td>`
    : '';

  const footHTML = `<tr>
    <td></td><td>TOTAL FILIAL</td>
    <td class="r grp-acum-td">${brl(totVA)}</td>
    <td class="r grp-acum-td">${brl(tickA)}</td>
    <td class="r grp-acum-td">${totQA.toLocaleString('pt-BR')}</td>
    ${footOntemCols}
  </tr>`;

  document.getElementById('rank-head').innerHTML = theadHTML;
  document.getElementById('rank-body').innerHTML = bodyHTML;
  document.getElementById('rank-foot').innerHTML = footHTML;

  show('s-report');
  window.scrollTo(0,0);
}

function backToSearch(){ show('s-filial'); window.scrollTo(0,0); }

loadData();
</script>
